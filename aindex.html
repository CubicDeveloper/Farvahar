<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farvahar Studio – Ancient Soul, Modern Worlds</title>
    <meta name="description"
        content="Iranian creative studio making video games, professional edits, and digital experiences." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        /* ════════════════════════════════════════════════════
       CSS CUSTOM PROPERTIES – Design Tokens
       ════════════════════════════════════════════════════ */
        :root {
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --gold-dim: #8A7020;
            --teal: #1A6B6B;
            --teal-bright: #2ABFBF;
            --navy: #0A1628;
            --navy-mid: #0F1F3A;
            --stone: #C9B99A;
            --stone-dim: #6B5D4A;
            --black: #050810;
            --surface: #0D1526;
            --text-primary: #F5EDD8;
            --text-secondary: #A89C84;
            --border-gold: rgba(212, 175, 55, 0.25);
            --glow-gold: 0 0 40px rgba(212, 175, 55, 0.3), 0 0 80px rgba(212, 175, 55, 0.1);
            --glow-teal: 0 0 30px rgba(42, 191, 191, 0.25);

            --font-display: 'Cinzel Decorative', serif;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Cormorant Garamond', serif;
            --font-ui: 'Inter', sans-serif;

            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ════════════════════════════════════════════════════
       RESET & BASE
       ════════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--black);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.7;
            overflow-x: hidden;
            cursor: default;
        }

        /* ====================== CUSTOM CURSOR ====================== */
        .custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            box-shadow: 0 0 20px var(--gold);
            transition: transform 0.05s ease;
            display: none;
        }

        .custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--gold);
        }

        .custom-cursor.active {
            transform: scale(1.9);
            border-color: var(--teal-bright);
            box-shadow: 0 0 30px var(--teal-bright);
        }

        /* Hide default cursor completely */
        body * {
            cursor: none !important;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 3px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font: inherit;
        }

        /* ════════════════════════════════════════════════════
       PERSIAN PATTERN OVERLAY (subtle background texture)
       ════════════════════════════════════════════════════ */
        .persian-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image:
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23D4AF37' stroke-width='0.8'%3E%3Cpolygon points='40,2 78,20 78,60 40,78 2,60 2,20'/%3E%3Cpolygon points='40,14 66,26 66,54 40,66 14,54 14,26'/%3E%3Ccircle cx='40' cy='40' r='8'/%3E%3Cline x1='40' y1='2' x2='40' y2='14'/%3E%3Cline x1='40' y1='66' x2='40' y2='78'/%3E%3Cline x1='2' y1='20' x2='14' y2='26'/%3E%3Cline x1='66' y1='54' x2='78' y2='60'/%3E%3Cline x1='78' y1='20' x2='66' y2='26'/%3E%3Cline x1='14' y1='54' x2='2' y2='60'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px;
        }

        /* ════════════════════════════════════════════════════
       STICKY HEADER (appears after scroll)
       ════════════════════════════════════════════════════ */
        #site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 72px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            background: transparent;
            transition: background var(--transition-smooth), backdrop-filter var(--transition-smooth), border-color var(--transition-smooth);
            border-bottom: 1px solid transparent;
        }

        #site-header.scrolled {
            background: rgba(5, 8, 16, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom-color: var(--border-gold);
        }

        #header-logo {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.4s, transform 0.4s;
            white-space: nowrap;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            flex-shrink: 0;
        }

        #header-logo.visible {
            opacity: 1;
            transform: scale(1);
        }

        #header-farvahar {
            width: auto;
            height: 32px;
            margin: 0 1rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
            flex-shrink: 0;
        }

        #header-farvahar.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #main-nav {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.4s 0.15s, transform 0.4s 0.15s;
        }

        #main-nav.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-link {
            font-family: var(--font-heading);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 0.5rem 0.75rem;
            border-radius: 2px;
            transition: color var(--transition-fast), background var(--transition-fast);
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            right: 50%;
            height: 1px;
            background: var(--gold);
            transition: left 0.3s, right 0.3s;
        }

        .nav-link:hover {
            color: var(--gold);
        }

        .nav-link:hover::after {
            left: 0.75rem;
            right: 0.75rem;
        }

        .nav-link.active {
            color: var(--gold);
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: var(--border-gold);
            margin: 0 0.5rem;
        }

        .btn-donate {
            font-family: var(--font-heading);
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            transition: background var(--transition-fast), color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .btn-donate:hover {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .btn-login {
            font-family: var(--font-heading);
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--teal-bright);
            border: 1px solid rgba(42, 191, 191, 0.35);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            margin-left: 0.5rem;
            transition: background var(--transition-fast), color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .btn-login:hover {
            background: var(--teal-bright);
            color: var(--black);
            box-shadow: 0 0 20px rgba(42, 191, 191, 0.35);
        }

        #hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            margin-left: auto;
            padding: 8px;
        }

        #hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--gold);
            transition: transform 0.3s, opacity 0.3s;
        }

        #hamburger.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        #hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        #hamburger.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        #mobile-menu {
            display: none;
            position: fixed;
            top: 72px;
            left: 0;
            right: 0;
            background: rgba(5, 8, 16, 0.97);
            backdrop-filter: blur(20px);
            z-index: 999;
            padding: 2rem;
            border-bottom: 1px solid var(--border-gold);
            flex-direction: column;
            gap: 1rem;
        }

        #mobile-menu.open {
            display: flex;
        }

        #mobile-menu .nav-link {
            font-size: 1rem;
            padding: 0.75rem 0;
        }

        /* ════════════════════════════════════════════════════
       HERO SECTION
       ════════════════════════════════════════════════════ */
        #hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(26, 107, 107, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 80% 80%, rgba(26, 107, 107, 0.1) 0%, transparent 60%),
                linear-gradient(180deg, var(--black) 0%, var(--navy) 50%, var(--black) 100%);
            z-index: 0;
        }

        #hero-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #hero-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            color: var(--gold);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-align: center;
            text-shadow: var(--glow-gold);
            position: relative;
            z-index: 10;
            will-change: transform, font-size, opacity;
            line-height: 1.2;
        }

        .hero-title-line {
            display: block;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0.75rem auto;
            position: relative;
            z-index: 10;
        }

        #hero-farvahar {
            position: relative;
            z-index: 10;
            width: auto;
            height: clamp(280px, 40vh, 480px);
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            animation: farvahar-float 6s ease-in-out infinite;
            will-change: transform;
            margin: 1rem 0;
        }

        @keyframes farvahar-float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            33% {
                transform: translateY(-12px) rotate(0.5deg);
            }

            66% {
                transform: translateY(-6px) rotate(-0.3deg);
            }
        }

        #hero-tagline {
            font-family: var(--font-body);
            font-style: italic;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: var(--stone);
            letter-spacing: 0.1em;
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: 0.5rem;
        }

        #hero-columns {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 5;
            padding: 0 4vw;
        }

        .hero-column {
            width: auto;
            height: 90%;
            opacity: 0.25;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .hero-column.right {
            transform: scaleX(-1);
        }

        #scroll-cue {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.7;
            animation: scroll-bounce 2s ease-in-out infinite;
        }

        #scroll-cue span {
            font-family: var(--font-heading);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--stone-dim);
        }

        #scroll-cue svg {
            color: var(--gold-dim);
        }

        @keyframes scroll-bounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(8px);
            }
        }

        /* ════════════════════════════════════════════════════
       PAGE SECTIONS
       ════════════════════════════════════════════════════ */
        .page-section {
            display: none;
            position: relative;
            z-index: 2;
            padding: 7rem 0 5rem;
        }

        .page-section.active {
            display: block;
        }

        #page-home {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-label {
            font-family: var(--font-heading);
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--teal-bright);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            height: 1px;
            width: 40px;
            background: linear-gradient(90deg, var(--teal-bright), transparent);
        }

        .section-label::after {
            background: linear-gradient(90deg, transparent, var(--teal-bright));
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: var(--gold);
            letter-spacing: 0.1em;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            margin-bottom: 1.5rem;
        }

        .section-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 60ch;
            line-height: 1.8;
        }

        .ornament-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 3rem 0;
        }

        .ornament-divider::before,
        .ornament-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
        }

        .ornament-divider-icon {
            color: var(--gold-dim);
            font-size: 1.2rem;
        }

        /* ════════════════════════════════════════════════════
       HOME PAGE – Featured Projects
       ════════════════════════════════════════════════════ */
        #home-content {
            position: relative;
            z-index: 2;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .project-card {
            background: linear-gradient(135deg, rgba(13, 21, 38, 0.9), rgba(5, 8, 16, 0.95));
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            overflow: hidden;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth), border-color var(--transition-smooth);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .card-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
        }

        .card-thumb-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-thumb.game {
            background: linear-gradient(135deg, #0A1628, #1A4040);
        }

        .card-thumb.edit {
            background: linear-gradient(135deg, #1A0A28, #3A1A60);
        }

        .card-thumb.site {
            background: linear-gradient(135deg, #0A280A, #1A4020);
        }

        .card-thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 8, 16, 0.8), transparent);
        }

        .card-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-family: var(--font-heading);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            border: 1px solid;
        }

        .card-tag.game {
            color: var(--teal-bright);
            border-color: rgba(42, 191, 191, 0.4);
            background: rgba(42, 191, 191, 0.1);
        }

        .card-tag.edit {
            color: #C080FF;
            border-color: rgba(192, 128, 255, 0.4);
            background: rgba(192, 128, 255, 0.1);
        }

        .card-tag.site {
            color: #60E080;
            border-color: rgba(96, 224, 128, 0.4);
            background: rgba(96, 224, 128, 0.1);
        }

        .card-tag.plan {
            color: var(--gold);
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.1);
        }

        .card-body {
            padding: 1.5rem;
        }

        .card-title {
            font-family: var(--font-heading);
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .card-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-meta {
            font-family: var(--font-ui);
            font-size: 0.72rem;
            color: var(--stone-dim);
            letter-spacing: 0.05em;
        }

        .card-arrow {
            color: var(--gold);
            font-size: 1.2rem;
            transition: transform var(--transition-fast);
        }

        .project-card:hover .card-arrow {
            transform: translateX(4px);
        }

        /* ════════════════════════════════════════════════════
       TESTIMONIALS
       ════════════════════════════════════════════════════ */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .testimonial-card {
            background: rgba(13, 21, 38, 0.6);
            border: 1px solid var(--border-gold);
            border-left: 3px solid var(--gold);
            padding: 2rem;
            border-radius: 2px;
            position: relative;
        }

        .testimonial-card::before {
            content: '"';
            font-family: var(--font-display);
            font-size: 5rem;
            color: rgba(212, 175, 55, 0.1);
            position: absolute;
            top: -1rem;
            left: 1rem;
            line-height: 1;
        }

        .testimonial-text {
            font-style: italic;
            font-size: 1rem;
            color: var(--stone);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .testimonial-author {
            font-family: var(--font-heading);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--gold);
        }

        .testimonial-role {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* ════════════════════════════════════════════════════
       WORKS PAGE
       ════════════════════════════════════════════════════ */
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .filter-btn {
            font-family: var(--font-heading);
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.25rem;
            border-radius: 2px;
            transition: all var(--transition-fast);
        }

        .filter-btn.active,
        .filter-btn:hover {
            color: var(--gold);
            border-color: var(--gold-dim);
            background: rgba(212, 175, 55, 0.08);
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .work-item {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            overflow: hidden;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }

        .work-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--glow-gold);
        }

        .work-thumb {
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .work-thumb.ue5 {
            background: linear-gradient(135deg, #0A1628, #1A3060);
        }

        .work-thumb.ae {
            background: linear-gradient(135deg, #1E0A2A, #3A1060);
        }

        .work-thumb.web {
            background: linear-gradient(135deg, #0A2010, #1A4020);
        }

        .work-info {
            padding: 1.25rem 1.5rem;
        }

        .work-title {
            font-family: var(--font-heading);
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .work-desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ════════════════════════════════════════════════════
       FUTURE PLANS / ROADMAP
       ════════════════════════════════════════════════════ */
        .roadmap {
            position: relative;
            padding-left: 3rem;
        }

        .roadmap::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--gold), var(--teal-bright), var(--gold-dim));
        }

        .roadmap-item {
            position: relative;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.6s, transform 0.6s;
        }

        .roadmap-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .roadmap-dot {
            position: absolute;
            left: -2.75rem;
            top: 0.25rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--black);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .roadmap-dot.active {
            background: var(--gold);
        }

        .roadmap-dot.upcoming {
            border-color: var(--teal-bright);
        }

        .roadmap-dot.upcoming.active {
            background: var(--teal-bright);
        }

        .roadmap-dot::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
        }

        .roadmap-dot.upcoming::after {
            background: var(--teal-bright);
        }

        .roadmap-phase {
            font-family: var(--font-heading);
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.4rem;
        }

        .roadmap-phase.upcoming {
            color: var(--teal-bright);
        }

        .roadmap-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .roadmap-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 60ch;
        }

        .roadmap-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .rtag {
            font-family: var(--font-ui);
            font-size: 0.68rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            color: var(--text-secondary);
            letter-spacing: 0.08em;
        }

        /* ════════════════════════════════════════════════════
       EDITS PAGE
       ════════════════════════════════════════════════════ */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            overflow: hidden;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(192, 128, 255, 0.15);
        }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            background: #000;
        }

        .video-embed iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .video-info {
            padding: 1.25rem 1.5rem;
        }

        .video-title {
            font-family: var(--font-heading);
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .video-meta {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        /* ════════════════════════════════════════════════════
       SITES PAGE
       ════════════════════════════════════════════════════ */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .site-card {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            overflow: hidden;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }

        .site-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(96, 224, 128, 0.1);
        }

        .site-preview {
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .site-preview.s1 {
            background: linear-gradient(135deg, #0A2010, #1A5030);
        }

        .site-preview.s2 {
            background: linear-gradient(135deg, #0A1628, #203060);
        }

        .site-preview.s3 {
            background: linear-gradient(135deg, #281008, #602010);
        }

        .site-browser-chrome {
            width: 85%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .browser-top {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .browser-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .browser-dot:nth-child(1) {
            background: #FF5F56;
        }

        .browser-dot:nth-child(2) {
            background: #FFBD2E;
        }

        .browser-dot:nth-child(3) {
            background: #27C93F;
        }

        .browser-body {
            padding: 1rem;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .browser-line {
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .browser-line:nth-child(2) {
            width: 80%;
        }

        .browser-line:nth-child(3) {
            width: 60%;
        }

        .site-info {
            padding: 1.25rem 1.5rem;
        }

        .site-name {
            font-family: var(--font-heading);
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .site-tech {
            font-size: 0.82rem;
            color: var(--teal-bright);
            margin-bottom: 0.4rem;
        }

        .site-desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .site-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1rem;
            font-family: var(--font-heading);
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            transition: gap var(--transition-fast);
        }

        .site-link:hover {
            gap: 0.75rem;
        }

        /* ════════════════════════════════════════════════════
       ABOUT PAGE
       ════════════════════════════════════════════════════ */
        .about-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: start;
        }

        .about-text p {
            font-size: 1.05rem;
            color: var(--stone);
            line-height: 1.9;
            margin-bottom: 1.5rem;
        }

        .about-text p:first-of-type::first-letter {
            font-family: var(--font-display);
            font-size: 3.5rem;
            color: var(--gold);
            float: left;
            line-height: 0.8;
            margin-right: 0.2rem;
            margin-top: 0.4rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .about-quote {
            border-left: 3px solid var(--gold);
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            background: rgba(212, 175, 55, 0.04);
            border-radius: 0 4px 4px 0;
        }

        .about-quote p {
            font-style: italic;
            font-size: 1.1rem !important;
            color: var(--gold-light) !important;
        }

        .about-quote cite {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: block;
            margin-top: 0.5rem;
        }

        .about-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-box {
            background: rgba(13, 21, 38, 0.8);
            border: 1px solid var(--border-gold);
            padding: 1.5rem;
            text-align: center;
            border-radius: 4px;
        }

        .stat-num {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--gold);
            text-shadow: var(--glow-gold);
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>

    <div class="custom-cursor" id="customCursor"></div>

    <div class="persian-pattern"></div>

    <header id="site-header">
        <div id="header-logo">Farvahar Studio</div>

        <img id="header-farvahar"
            src="https://i.ibb.co/6wXbN3w/Gemini-Generated-Image-n62i40n62i40n62i-removebg-preview.png" alt="Icon">

        <nav id="main-nav">
            <a href="#hero" class="nav-link active">Home</a>
            <a href="#works" class="nav-link">Works</a>
            <a href="#about" class="nav-link">About</a>
            <span class="nav-divider"></span>
            <button class="btn-donate">Donate</button>
            <button class="btn-login">Login</button>
        </nav>

        <button id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <section id="hero">
        <canvas id="hero-canvas"></canvas>

        <h1 id="hero-title">Farvahar Studio</h1>
        <div class="hero-title-line"></div>

        <img id="hero-farvahar"
            src="https://i.ibb.co/6wXbN3w/Gemini-Generated-Image-n62i40n62i40n62i-removebg-preview.png"
            alt="Achaemenid Column Centerpiece">

        <p id="hero-tagline">Ancient Soul, Modern Worlds</p>

        <div id="hero-columns">
            <img class="hero-column left"
                src="https://i.ibb.co/6wXbN3w/Gemini-Generated-Image-n62i40n62i40n62i-removebg-preview.png"
                alt="Column Pillar Left">
            <img class="hero-column right"
                src="https://i.ibb.co/6wXbN3w/Gemini-Generated-Image-n62i40n62i40n62i-removebg-preview.png"
                alt="Column Pillar Right">
        </div>

        <div id="scroll-cue">
            <span>Scroll</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M19 12l-7 7-7-7" />
            </svg>
        </div>
    </section>

    <script>
        // 1. Interactive Custom Cursor Following Logic
        const cursor = document.getElementById('customCursor');
        if (window.innerWidth > 768) {
            cursor.style.display = 'block';
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX - 16 + 'px';
                cursor.style.top = e.clientY - 16 + 'px';
            });

            document.querySelectorAll('a, button, .project-card').forEach(elem => {
                elem.addEventListener('mouseenter', () => cursor.classList.add('active'));
                elem.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });
        }

        // 2. Control Header Styling states on Scroll Actions
        const header = document.getElementById('site-header');
        const headerLogo = document.getElementById('header-logo');
        const headerFarvahar = document.getElementById('header-farvahar');
        const mainNav = document.getElementById('main-nav');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 120) {
                header.classList.add('scrolled');
                headerLogo.classList.add('visible');
                headerFarvahar.classList.add('visible');
                mainNav.classList.add('visible');
            } else {
                header.classList.remove('scrolled');
                headerLogo.classList.remove('visible');
                headerFarvahar.classList.remove('visible');
                mainNav.classList.remove('visible');
            }
        });

        // 3. Basic Hamburger Menu Click Event
        const hamburger = document.getElementById('hamburger');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
        });
    </script>

</body>

</html>
